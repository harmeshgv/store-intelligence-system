services:
  api:
    build: .
    container_name: store-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./events_output.jsonl:/app/events_output.jsonl
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  pipeline:
    build: .
    container_name: store-pipeline
    command: python pipeline/run.py
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000
      STORE_ID: STORE_BLR_002
    volumes:
      - ./pipeline:/app/pipeline
      - ./data:/app/data
      - ./events_output.jsonl:/app/events_output.jsonl
      - ./app:/app/app
    restart: unless-stopped

  dashboard:
    image: python:3.10-slim
    container_name: store-dashboard
    working_dir: /app
    command: python -m http.server 5500
    ports:
      - "5500:5500"
    volumes:
      - ./dashboard:/app/dashboard
    restart: unless-stopped